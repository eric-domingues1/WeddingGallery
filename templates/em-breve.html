<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Galeria de Casamento — em breve</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,450;9..144,600&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#152019;
    --ink-2:#1d2b22;
    --parchment:#efe7d6;
    --parchment-dim:#c9c0ab;
    --gold:#c6a468;
    --hairline:rgba(198,164,104,0.35);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse at 50% 0%, var(--ink-2) 0%, var(--ink) 70%);
    color:var(--parchment);
    font-family:'Work Sans', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:32px;
    overflow:hidden;
  }
  .card{
    max-width:560px;
    width:100%;
    text-align:center;
    position:relative;
  }
  .ornament{
    width:72px;
    height:72px;
    margin:0 auto 28px;
    opacity:0;
    animation:fade-in 1s ease-out 0.3s forwards;
  }
  .ornament path{
    fill:none;
    stroke:var(--gold);
    stroke-width:1.4;
    stroke-linecap:round;
    stroke-dasharray:220;
    stroke-dashoffset:220;
    animation:draw 2.2s ease-out 0.4s forwards;
  }
  @keyframes draw{ to{ stroke-dashoffset:0; } }
  @keyframes fade-in{ to{ opacity:1; } }

  .eyebrow{
    font-size:12px;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--gold);
    margin:0 0 18px;
    font-weight:500;
    opacity:0;
    animation:rise 0.8s ease-out 0.6s forwards;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:450;
    font-size:clamp(40px, 8vw, 64px);
    line-height:1.05;
    margin:0 0 22px;
    letter-spacing:-0.01em;
    opacity:0;
    animation:rise 0.9s ease-out 0.8s forwards;
  }
  h1 em{
    font-style:italic;
    font-weight:300;
    color:var(--parchment-dim);
  }
  p.lede{
    font-size:16px;
    line-height:1.7;
    color:var(--parchment-dim);
    margin:0 auto 34px;
    max-width:400px;
    opacity:0;
    animation:rise 0.9s ease-out 1s forwards;
  }
  .hairline{
    width:64px;
    height:1px;
    background:var(--hairline);
    margin:0 auto 34px;
    opacity:0;
    animation:rise 0.9s ease-out 1.2s forwards;
  }
  .note{
    font-size:13px;
    letter-spacing:0.06em;
    color:var(--parchment-dim);
    opacity:0;
    animation:rise 0.9s ease-out 1.4s forwards;
  }
  .note a{
    color:var(--gold);
    text-decoration:none;
    border-bottom:1px solid var(--hairline);
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }
  @media (prefers-reduced-motion: reduce){
    .ornament, .ornament path, .eyebrow, h1, p.lede, .hairline, .note{
      animation:none !important;
      opacity:1 !important;
      stroke-dashoffset:0 !important;
    }
  }
</style>
</head>
<body>
  <div class="card">
    <svg class="ornament" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
      <path d="M36 8 C 18 8, 8 22, 8 36 C 8 52, 22 64, 36 64 C 50 64, 64 52, 64 36 C 64 22, 54 8, 36 8 Z M36 8 C 30 20, 30 52, 36 64 M8 36 C 22 30, 52 30, 64 36"/>
    </svg>
    <p class="eyebrow">Galeria de Casamento</p>
    <h1>Em breve, um <em>novo</em> espaço.</h1>
    <p class="lede">Estamos preparando um lugar para casais criarem e compartilharem a galeria de fotos do seu casamento com os convidados.</p>
    <div class="hairline"></div>
    <p class="note">Já tem um convite com link? Acesse pelo endereço que você recebeu.</p>
  </div>
</body>
</html>
